<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Oréal Beauty Chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <img src="loreal-logo.png" alt="L'Oréal Logo" class="logo">
        <h1>L'Oréal Beauty Assistant</h1>
        <p>Your personalized guide to skincare, makeup, and haircare</p>
    </header>

    <main>
        <div id="chat-area"></div>

        <form id="chat-form">
            <input 
                id="user-input" 
                type="text" 
                placeholder="Ask me about L'Oréal products or routines..." 
                autocomplete="off"
            >
            <button type="submit">Send</button>
        </form>
    </main>

    <footer>
        <p>Powered by AI • Built for L'Oréal</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
