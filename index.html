<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>L'Oréal Beauty Chatbot</title>
    <link rel="stylesheet" href="style.css" />
    <!-- Local testing only; remove before deploy -->
    <!-- <script src="secrets.js"></script> -->
  </head>
  <body>
    <header class="header">
      <img src="img/loreal-logo.png" alt="L'Oréal" class="logo" />
      <h1>Beauty Assistant</h1>
    </header>

    <main class="chat-container">
      <div id="chat-window" class="chat-window"></div>
      <div class="input-row">
        <input
          id="user-input"
          type="text"
          placeholder="Ask about L'Oréal products or routines..."
        />
        <button id="send-btn">Send</button>
      </div>
    </main>

    <footer class="footer">
      <p>Powered by AI • L'Oréal-inspired experience</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
