<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Oréal Beauty Chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="header">
        <img src="loreal-logo.png" class="logo" alt="L'Oréal Logo">
        <h1>L'Oréal Beauty Assistant</h1>
        <p>Your personalized guide to skincare, makeup, and haircare</p>
    </header>

    <main class="container">

        <section class="chat-section">
            <h2 class="section-title">Ask the Beauty Assistant</h2>

            <div id="chat-area" class="chat-area"></div>

            <form id="chat-form" class="chat-form">
                <input 
                    id="user-input" 
                    type="text" 
                    placeholder="Ask me about L'Oréal products or routines..."
                    autocomplete="off"
                >
                <button type="submit">Send</button>
            </form>
        </section>

    </main>

</body>
<script src="script.js"></script>
</html>
