<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>L’Oréal Beauty Chatbot</title>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <header class="header">
        <img src="loreal-logo.png" alt="L’Oréal Logo" class="logo" />
        <h1>L’Oréal Beauty Assistant</h1>
        <p>Your personalized guide to skincare, makeup, and haircare</p>
    </header>

    <main class="chat-container">

        <div id="chat-area" class="chat-area"></div>

        <form id="chat-form" class="chat-form">
            <input 
                id="user-input" 
                type="text" 
                placeholder="Ask me about L’Oréal products or routines..." 
                autocomplete="off"
            />
            <button type="submit" class="send-btn">Send</button>
        </form>

    </main>

    <footer class="footer">
        <p>Built for the L’Oréal AI Project • Web Development</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
